syntax = "proto3";

package im.push;

import "base.proto";

// PushService is the service-to-service boundary used by Gateway and other
// message entry points to request best-effort online delivery.
service PushService {
    rpc NotifyUser(NotifyUserRequest) returns (NotifyUserResponse) {}
}

// Gateway-owned delivery surface used by a standalone Push server to reach
// live WebSocket sessions without taking session ownership away from Gateway.
service GatewayPushDeliveryService {
    rpc ListUserSessions(ListUserSessionsRequest) returns (ListUserSessionsResponse) {}
    rpc SendSessionPayload(SendSessionPayloadRequest) returns (SendSessionPayloadResponse) {}
    rpc MarkMessageDelivered(MarkMessageDeliveredRequest) returns (MarkMessageDeliveredResponse) {}
}

// 推送类型枚举
enum PushType {
    PUSH_MESSAGE = 0;      // 普通消息推送
    PUSH_NOTIFICATION = 1; // 通知类推送
    PUSH_SYSTEM = 2;       // 系统消息推送
    PUSH_OFFLINE = 3;      // 离线消息推送
}

// 推送消息结构
message PushMessageBody {
    string push_id = 1;            // 推送唯一ID
    PushType type = 2;             // 推送类型
    string content = 3;            // 推送内容
    string related_message_id = 4; // 关联的消息ID（如有）
    string ext = 5;                // 扩展字段
}

// 推送请求
message PushRequest {
    im.base.IMHeader header = 1;   // 通用消息头
    PushMessageBody body = 2;      // 推送内容
}

// 推送响应
message PushResponse {
    im.base.BaseResponse base = 1; // 通用响应头
}

// 服务间推送通知请求。调用方应在消息持久化成功后传入接收者、消息ID和内容。
message NotifyUserRequest {
    string receiver_uid = 1; // 接收者用户ID
    uint64 msg_id = 2;       // 已持久化的消息ID
    string content = 3;      // 推送内容
    string sender_uid = 4;   // 原始发送者用户ID
    string conversation_type = 5; // direct/group/system
    string conversation_id = 6;   // 单聊对端UID或群ID
}

// 服务间推送通知响应。当前 PushRuntime 是 best-effort 语义，成功仅表示请求已被接收。
message NotifyUserResponse {
    im.base.BaseResponse base = 1; // 通用响应头
}

message PushSession {
    string session_id = 1;      // Gateway WebSocket session ID
    string platform = 2;        // device platform, e.g. web/android/ios
    int64 connect_time_ms = 3;  // connection time since Unix epoch in milliseconds
}

message ListUserSessionsRequest {
    string receiver_uid = 1;
}

message ListUserSessionsResponse {
    im.base.BaseResponse base = 1;
    repeated PushSession sessions = 2;
}

message SendSessionPayloadRequest {
    string session_id = 1;
    bytes payload = 2;
}

message SendSessionPayloadResponse {
    im.base.BaseResponse base = 1;
    bool accepted = 2;
}

message MarkMessageDeliveredRequest {
    uint64 msg_id = 1;
    int64 delivered_time = 2;
}

message MarkMessageDeliveredResponse {
    im.base.BaseResponse base = 1;
    bool marked = 2;
}
