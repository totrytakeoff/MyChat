services:
  redis:
    image: redis:7-alpine
    container_name: mychat-redis
    command: ["redis-server", "--requirepass", "mychat-dev-pass"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "mychat-dev-pass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:16-alpine
    container_name: mychat-postgres
    environment:
      POSTGRES_DB: mychat
      POSTGRES_USER: mychat
      POSTGRES_PASSWORD: mychat-dev-pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./common/database/pgsql/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mychat -d mychat"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  redis-data:
  postgres-data:
